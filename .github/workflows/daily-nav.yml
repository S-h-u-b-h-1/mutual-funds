name: Daily NAV pipeline

on:
  schedule:
    - cron: "30 14 * * 1-6"   # 14:30 UTC = 8:00pm IST, Mon–Sat (after AMFI publishes)
  workflow_dispatch: {}

jobs:
  ingest:
    name: Ingest AMFI NAV → Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run cloud pipeline
        env:
          SUPABASE_URL: https://fffxwcpptpyjuifknayj.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional alert channels — set as repo secrets to enable.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY not set — skipping ingestion."
            echo "Add it under Settings → Secrets → Actions to activate the daily pipeline."
            exit 0
          fi
          python -m scripts.cloud_pipeline
