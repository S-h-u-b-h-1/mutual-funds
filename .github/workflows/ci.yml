name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Python data-quality tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest openpyxl
      # -m adds the repo root to sys.path so `ingestion` imports cleanly
      - run: python -m pytest tests/ -q

  frontend-build:
    name: Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # The anon key is publishable (RLS-protected) — safe as a default.
          # Override via repo secrets of the same name if you prefer.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://autijihzocnxduipeaop.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1dGlqaWh6b2NueGR1aXBlYW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4OTg4NzUsImV4cCI6MjA5NzQ3NDg3NX0.dKI5I_B04D92u40V_ytNYc-z1DZiD5_WKqyaFcgxffA' }}
